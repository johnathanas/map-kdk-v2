    var markers = [];
	var markersDict = {};
	var activeFilters = new Set(); // store selected types
	var selectedMarker = null;

	function addMarkers() {
  // Clear existing markers
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  markersDict = {};
  selectedMarker = null; // reset selection

  equipment.forEach(function(item) {
    var id = item[0];
    var desc = item[1];
    var lat = item[2];
    var lng = item[3];
    var type = item[4];

    // φίλτρα
    if (activeFilters.size > 0 && !activeFilters.has(type)) return;

    var icon;
    if (type === 1) icon = pinGreen;
    else if (type === 2) icon = pinOrange;
    else if (type === 3) icon = pinBlue;
    else if (type === 4) icon = pinPurple;
    else if (type === 5) icon = pinGrey;

    var streetViewUrl = "https://www.google.com/maps?q=&layer=c&cbll=" + lat + "," + lng;
    var directionsUrl = "https://www.google.com/maps/dir/?api=1&destination=" + lat + "," + lng;

  var marker = L.marker([lat, lng], { icon: icon })
  .bindPopup(
    "<b>" + id + "</b><br>" + desc +
    "<br><a href='" + streetViewUrl + "' target='_blank'>Street View</a>" +
    "<br><a href='" + directionsUrl + "' target='_blank'>🚗 Οδήγηση προς εδώ</a>",
    {
      offset: [0, -50],
      autoPan: true
    }
  );
    marker.originalIcon = icon;

    // 👉 ΚΡΑΤΑΜΕ το αρχικό icon (ΣΗΜΑΝΤΙΚΟ)
    marker.originalIcon = icon;

    marker.addTo(map);

    if (!markersDict[id]) markersDict[id] = [];
    markersDict[id].push(marker);

    markers.push(marker);
  });

  // zoom
  if (markers.length > 0) {
    var group = new L.featureGroup(markers);
    map.fitBounds(group.getBounds());
  }
}	
	
	function toggleFilter(type) {
	  var btn = document.getElementById("btnType" + type);
      if (activeFilters.has(type)) {
        activeFilters.delete(type);
        btn.classList.remove("active");
      } else {
        activeFilters.add(type);
        btn.classList.add("active");
      }
      addMarkers();
    }
	
	function showAll() {
      activeFilters.clear();
      document.querySelectorAll("#controls button").forEach(btn => btn.classList.remove("active"));
      addMarkers();
    }
	
	// Show all markers on load
    addMarkers();
	

    function searchMapByName(equipID) {
    var marker = markersDict[equipID]; // use dictionary
    if (marker) {
      map.setView(marker.getLatLng(), 16);
      marker.openPopup();
    }
  }

function searchMap() {
  var input = document.getElementById("searchInput").value.toLowerCase();
  var resultsDiv = document.getElementById("searchResults");
  resultsDiv.innerHTML = "";

  if (!input) return;

  var results = [];

  equipment.forEach(function(item) {
    var id = item[0];
    var desc = item[1].toLowerCase();

    if (id.toLowerCase().includes(input) || desc.includes(input)) {
      results.push(item);
    }
  });

  if (results.length > 0) {

    var matchedMarkers = [];

    results.forEach(function(item) {

      var id = item[0];
      var desc = item[1];

      var list = markersDict[id];

      if (!list) return;

      list.forEach(function(marker) {

        matchedMarkers.push(marker);

        var div = document.createElement("div");
        div.className = "result-item";
        div.innerHTML = "<b>" + id + "</b> – " + desc;

        div.onclick = function() {

  // 🔁 επαναφορά προηγούμενου marker
  if (selectedMarker) {
    selectedMarker.setIcon(selectedMarker.originalIcon);
    selectedMarker.setZIndexOffset(0);
  }

  // νέο selected marker
  selectedMarker = marker;

  // 🔴 highlight
  marker.setIcon(pinRed);
  marker.setZIndexOffset(1000);

  // zoom + popup
  map.setView(marker.getLatLng(), 25);
  marker.openPopup();
};

        resultsDiv.appendChild(div);

      });

    });


  } else {
    resultsDiv.innerHTML = "<em>Δεν βρέθηκαν αποτελέσματα.</em>";
  }
}
   
    // Allow pressing Enter to trigger search
    document.getElementById("searchInput").addEventListener("keyup", function(event) {
      if (event.key === "Enter") {
        searchMap();
      }
    });
